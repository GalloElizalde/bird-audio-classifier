# Train Hyperparameters
train:
    n_epochs: 30  
    lr: 0.0001
    wd: 0.0001
    num_workers: 6     
    batch_size: 16      
    pin_memory: True
    persistent_workers: True
    prefetch_factor: 4  
    resume_training_model: "empty"  # checkpoint name or "empty"

# Data Augmentation and sampling Config
augment:
    gamma: -0.5  # exponent for weighted sampling
    p_noise: 0.5  
    alpha: 0.1   
    p_soundscape_noise: 1.0  
    p_mix: 0.5  
    p_filter: 0.1 
    p_mask: 0.1  
    
# Model Config
model:
    dropout: 0.25
    m_type: "dbmel"   #"dbmel" , "wigner"

# Spectrogram Config
spectrogram: 
    n_fft: 2048
    hop_length: 512
    n_mels: 128

# Combined Loss (BCE + Focal)
# final_loss = beta * BCE + (1-beta) * Focal
loss:
    beta: 1.0
    rho: 2.0  # focal focusing factor

